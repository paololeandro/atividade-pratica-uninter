<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="menu"> <!-- estrutura de links consistente em todas as páginas para o menu-->
    <ul>
      <li><a href="sobre.html">Sobre mim</a></li>
      <li><a href="formacao.html">Formação</a></li>
      <li><a href="portfolio.html">Portfólio</a></li>
      <li><a href="contato.html" class="active">Contato</a></li>
    </ul>
  </nav>

  <main class="contato-container">
    <section class="contato-conteudo">
      <h2>Entre em Contato</h2>
      <form id="contatoForm"> <!-- aqui podemos validar se os campos estao preenchidos no proprio html para reduzir codigo no js -->
          <input type="text" id="nome" placeholder="Nome" required>
          
          <input type="email" id="email" placeholder="E-mail" required>
          
          <textarea id="mensagem" placeholder="Sua mensagem" required></textarea>
          
          <button type="submit" id="btn">Enviar</button>
      </form>
      <p id="status"></p>
    </section>
  </main>

  <script> // adicionado de forma inline por ser simples, aqui só precisamos interceptar o clique para mostrar que o envio funcionou, ja que a validacao dos campos requeridos esta no html
    const form = document.getElementById('contatoForm');
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');

      form.addEventListener('submit', function(e) {
        e.preventDefault(); // nao recarrega a página

        // simulacao do envio
        btn.innerText = "Enviando...";
        btn.disabled = true;

        setTimeout(() => {
            status.innerText = "Mensagem enviada com sucesso!";
            status.style.display = "block";
            
            btn.innerText = "Enviar";
            btn.disabled = false;
            
            form.reset(); // aqui limpamos os campos após o envio
        }, 1000);
      });
  </script>

</body>
</html>
