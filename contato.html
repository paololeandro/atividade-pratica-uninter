<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="menu"> <!-- estrutura de links consistente em todas as páginas para o menu-->
    <ul>
      <li><a href="index.html">Sobre mim</a></li>
      <li><a href="formacao.html">Formação</a></li>
      <li><a href="portfolio.html">Portfólio</a></li>
      <li><a href="contato.html" class="active">Contato</a></li>
    </ul>
  </nav>

  <section class="contato-container">
      <h2>Entre em contato</h2>
      <form id="meuFormulario">
          <div class="campo">
              <label for="nome">Nome:</label>
              <input type="text" id="nome" placeholder="Digite seu nome completo">
              <span class="erro" id="erro-nome">O nome é obrigatório.</span>
          </div>

          <div class="campo">
              <label for="email">E-mail:</label>
              <input type="email" id="email" placeholder="seu@email.com">
              <span class="erro" id="erro-email">Insira um e-mail válido.</span>
          </div>

          <div class="campo">
              <label for="mensagem">Mensagem:</label>
              <textarea id="mensagem" rows="5" placeholder="Como posso ajudar?"></textarea>
              <span class="erro" id="erro-mensagem">A mensagem não pode estar vazia.</span>
          </div>

          <button type="submit" id="btnEnviar">Enviar Mensagem</button>
      </form>
      
      <!-- mensagem para simular o sucesso do envio -->
      <div id="sucesso">
          Mensagem enviada com sucesso!
      </div>
  </section>

  <!-- link para o script -->
  <script src="script.js"></script>
</body>
</html>
